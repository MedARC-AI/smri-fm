# @package model
# smri-fm MAE backbone, registered into asparagus via ASPARAGUS_FINETUNE_CONFIGS / etc.

dimensions: 3D
use_skip_connections: True
deep_supervision: False

seg_net: smri_fm_mae
cls_net: smri_fm_mae
reg_net: smri_fm_mae
pretrain_net: smri_fm_mae
plugin_seg_net: smri_fm_mae

_seg_net:
  _target_: smri_fm.asparagus_bridge.models.SmriFmBackbone
  dimensions: ${model.dimensions}
  deep_supervision: ${model.deep_supervision}

_cls_net:
  _target_: smri_fm.asparagus_bridge.models.SmriFmBackbone
  dimensions: ${model.dimensions}

_reg_net:
  _target_: smri_fm.asparagus_bridge.models.SmriFmBackbone
  dimensions: ${model.dimensions}

_pretrain_net:
  _target_: smri_fm.asparagus_bridge.models.SmriFmBackbone
  dimensions: ${model.dimensions}
  use_skip_connections: ${model.use_skip_connections}

_plugin_seg_net:
  _target_: smri_fm.asparagus_bridge.models.SmriFmBackbone
  dimensions: ${model.dimensions}

pretrain_optim: AdamW
pretrain_lr: 1e-4
train_optim: AdamW
train_lr: 1e-4
finetune_optim: AdamW
finetune_lr: 1e-4
weight_decay: 3e-5
nesterov: False
momentum: 0.9
patch_embed_size: 4
